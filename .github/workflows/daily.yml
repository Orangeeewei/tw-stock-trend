name: daily-report

on:
  schedule:
    # 避開整點 0 分:GitHub 排程在每個整點負載最高,最常被延遲數小時甚至直接丟棄;
    # 挪到非整點分鐘可大幅降低漏跑機率(GitHub 官方建議,但仍非 100% 保證)。
    - cron: "17 9 * * 1-5"   # 台股:台北 17:17,週一到週五;三大法人資料約 16:00 公布
    - cron: "47 21 * * 1-5"  # 美股:UTC 21:47 = 美東收盤後(台北清晨 5:47)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      # 手動觸發(workflow_dispatch)時兩個市場都跑
      RUN_TW: ${{ github.event.schedule != '47 21 * * 1-5' }}
      RUN_US: ${{ github.event.schedule != '17 9 * * 1-5' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # 資料庫存在 Actions cache;每天執行所以不會閒置過期。
      - uses: actions/cache/restore@v5
        with:
          path: data/market.db
          key: market-db-${{ github.run_id }}
          restore-keys: |
            market-db-

      # cache 遺失時改用 Release 的種子資料庫,避免從頭回補
      # (短時間 350+ 請求會觸發證交所/櫃買的防爬蟲封鎖;
      #  美股不受影響:Yahoo 每次給 3 個月視窗,自我修復)
      - name: 還原種子資料庫(僅在 cache 遺失時)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f data/market.db ]; then
            mkdir -p data
            gh release download seed-db -p market.db -O data/market.db
            echo "已從 Release 種子還原資料庫"
          fi

      - name: 台股:更新資料(已抓過的日期自動跳過)
        if: env.RUN_TW == 'true'
        run: python main.py backfill --days 130

      - name: 台股:產生報告
        if: env.RUN_TW == 'true'
        run: python main.py report

      - name: 美股:更新資料 + 產生報告
        if: env.RUN_US == 'true'
        run: |
          python main.py us-update
          python main.py us-report

      - uses: actions/cache/save@v5
        if: always()
        with:
          path: data/market.db
          key: market-db-${{ github.run_id }}

      - name: 發佈到 GitHub Pages(commit docs/ 與營收快取種子)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 一併 commit 月營收快取:成功跑完才更新,讓它永遠是新鮮的備援種子,
          # 下次營收 API 打嗝時 runner 仍有退路(月營收月更,daily diff 多半為空)。
          # 先 commit 再 rebase:工作目錄乾淨,rebase 才不會因未暫存變更罷工
          # (revenue_cache.json 有進版控,改動若未先 commit 會讓 pull --rebase 失敗)。
          # 加整個 data 目錄(靠 .gitignore 只放行 4 個種子檔,market.db 等仍忽略):
          # 不可逐檔列出——TW 跑只產 dividends/revenue_history、US 跑只產 sp500_history,
          # 列出缺檔會讓 git add 以 exit 128 中止、整步發佈失敗。
          git add docs data
          if git diff --cached --quiet; then
            echo "沒有變更,略過發佈"
            exit 0
          fi
          git commit -m "report: $(date -u +%F)"
          # 推送重試:處理與雲端 routine / pages 部署的並發競爭
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "推送衝突,重試 $i/5…"
            sleep 5
          done
          echo "::error::5 次重試後仍無法推送" && exit 1

      - name: 台股 Discord 推播
        if: env.RUN_TW == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPORT_URL: https://orangeeewei.github.io/tw-stock-trend/
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            python notify_discord.py
          else
            echo "未設定 DISCORD_WEBHOOK_URL secret,跳過推播"
          fi

      - name: 美股 Discord 推播(英文)
        if: env.RUN_US == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPORT_URL: https://orangeeewei.github.io/tw-stock-trend/us/
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            python notify_discord.py --us
          else
            echo "未設定 DISCORD_WEBHOOK_URL secret,跳過推播"
          fi

      # 每月 1 號刷新種子,避免 cache 與種子同時遺失時出現補不回來的資料缺口
      - name: 每月刷新種子資料庫
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(date -u +%d)" = "01" ]; then
            gh release upload seed-db data/market.db --clobber
            echo "種子資料庫已刷新"
          fi
